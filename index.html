<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setana TV</title>
	    <link rel="icon" href="icon.png" type="image/x-icon" />
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .image-container {
            margin: 10px 0;
            text-align: center;
        }
        .image-container a {
            display: inline-block;
            border: 2px solid #ddd;
            border-radius: 5px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .image-container a:hover {
            transform: scale(1.05);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .image-container img {
            display: block;
            width: 100%;
            max-width: 500px;
            height: auto;
        }
    </style>
</head>
<body>
    <div class="image-container">
        <a href="1setana" target="_blank">
            <img src="SetantaSport1.png" alt="Rasm 1">
        </a>
    </div>
    <div class="image-container">
        <a href="2setana" target="_blank">
            <img src="SetanaSport2.png" alt="Rasm 2">
        </a>
    </div>
</body>
</html>
